<style>
  body { image-rendering: pixelated; }
  .scanlines {
    background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
    background-size: 100% 4px;
    pointer-events: none;
  }
  .crt-flicker { animation: flicker 0.15s infinite alternate; }
  @keyframes flicker { 0% { opacity: 0.95; } 100% { opacity: 1; } }
  .pixel-border {
    box-shadow: 0 -4px 0 0 #5555AA, 0 4px 0 0 #5555AA, -4px 0 0 0 #5555AA, 4px 0 0 0 #5555AA, 0 0 0 4px #161629;
    border: 4px solid #161629;
    box-sizing: border-box;
  }
  .pixel-btn { box-shadow: 0 4px 0 0 #095300; transition: all 0.1s steps(2); }
  .pixel-btn:active { transform: translateY(4px); box-shadow: 0 0 0 0 #095300; }
  .dirt-bg {
    background-color: #2A1A0E;
    background-image: radial-gradient(#1a0f08 15%, transparent 16%), radial-gradient(#1a0f08 15%, transparent 16%);
    background-size: 32px 32px;
    background-position: 0 0, 16px 16px;
  }
  .hole {
    background: radial-gradient(ellipse at center, #000 0%, #111 70%, #2A1A0E 100%);
    box-shadow: inset 0 8px 16px rgba(0,0,0,0.9);
    border-bottom: 4px solid #4a2e1b;
  }
  .combo-glow { box-shadow: 0 0 15px #7c04bc; }

  /* ── Avatar state animations ── */
  @keyframes rise {
    from { transform: translateY(110%); }
    to   { transform: translateY(0%); }
  }
  @keyframes fall {
    from { transform: translateY(0%); }
    to   { transform: translateY(110%); }
  }
  @keyframes idle-float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-5px); }
  }
  @keyframes hit-flash {
    0%   { filter: brightness(1) saturate(1);  opacity: 1; }
    40%  { filter: brightness(3) saturate(0) drop-shadow(0 0 12px #FFE135); opacity: 1; }
    100% { filter: brightness(1) saturate(1);  opacity: 0; }
  }
  @keyframes bonk-pop {
    0%   { transform: translateY(0)   scale(1);   opacity: 1; }
    60%  { transform: translateY(-24px) scale(1.3); opacity: 1; }
    100% { transform: translateY(-48px) scale(1.1); opacity: 0; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-4px); }
    40%      { transform: translateX(4px); }
    60%      { transform: translateX(-3px); }
    80%      { transform: translateX(3px); }
  }

  .avatar-rising  { animation: rise 220ms ease-out forwards; }
  .avatar-up      { animation: idle-float 0.9s ease-in-out infinite; }
  .avatar-falling { animation: fall 280ms ease-in forwards; }
  .hit-flash-anim { animation: hit-flash 220ms ease-out forwards; }
  .bonk-pop-anim  { animation: bonk-pop 550ms ease-out forwards; }
  .life-shake     { animation: shake 350ms ease-in-out; }

  /* Sprite wrapper clips animation overflow */
  .sprite-clip { overflow: hidden; }

  /* Crosshair cursor on sprites */
  .avatar-sprite { cursor: crosshair; }
  .avatar-sprite:hover { filter: drop-shadow(0 0 8px #00F5FF); }

  /* Hole slot: clips anything below the oval */
  .hole-slot { position: relative; }

  /* ── Sound toggle ── */
  #btn-sound.muted .sound-on  { display: none; }
  #btn-sound:not(.muted) .sound-off { display: none; }

  @media (prefers-reduced-motion: reduce) {
    .avatar-rising, .avatar-up, .avatar-falling,
    .hit-flash-anim, .bonk-pop-anim, .life-shake,
    .crt-flicker { animation-duration: 0.01ms !important; }
  }
</style>

<script>
// ─────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────
const CHARACTERS = [
  { id:"ica",   name:"Teh Ica",   points:100, speed:1.0, barColor:"bg-secondary-container",
    sprite:"assets/images/chibi_ica.webp" },
  { id:"qony",  name:"Teh Qony",  points:150, speed:1.3, barColor:"bg-primary-container",
    sprite:"assets/images/chibi_qony.webp" },
  { id:"rei",   name:"Teh Rei",   points:120, speed:1.1, barColor:"bg-error",
    sprite:"assets/images/chibi_rei.webp" },
  { id:"alfin", name:"Alfin",     points:200, speed:1.6, barColor:"bg-neon-cyan",
    sprite:"assets/images/chibi_alfin.webp" },
  { id:"reza",  name:"Reza",      points:140, speed:1.4, barColor:"bg-primary",
    sprite:"assets/images/chibi_reza.webp" },
  { id:"disa",  name:"Teh Disa",  points:130, speed:1.2, barColor:"bg-neon-yellow",
    sprite:"assets/images/chibi_disa.webp" }
];

const DIFFICULTY_CONFIG = {
  easy:   { spawnInterval:1400, upDuration:1200, maxSimultaneous:2, comboDecay:2500 },
  normal: { spawnInterval:900,  upDuration:800,  maxSimultaneous:3, comboDecay:2000 },
  hard:   { spawnInterval:550,  upDuration:500,  maxSimultaneous:5, comboDecay:1500 }
};

// Chiptune-style oscillator SFX — no external files needed
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let sfxAudioCtx = null;
let soundEnabled = true;

function getAudioCtx() {
  if (!sfxAudioCtx) sfxAudioCtx = new AudioCtx();
  return sfxAudioCtx;
}

// Synthesise a short retro blip
function playBlip(freq = 440, type = 'square', duration = 0.12, vol = 0.18) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, ctx.currentTime + duration);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

// Unique SFX per character (different freq + waveform combos)
const CHAR_SFX = {
  ica:   () => { playBlip(880, 'square', 0.10, 0.2); setTimeout(() => playBlip(660, 'square', 0.08, 0.15), 60); },
  qony:  () => { playBlip(660, 'sawtooth', 0.13, 0.18); },
  rei:   () => { playBlip(520, 'square', 0.08, 0.2); setTimeout(() => playBlip(780, 'square', 0.10, 0.2), 80); },
  alfin: () => { playBlip(440, 'sawtooth', 0.06, 0.2); setTimeout(() => playBlip(880, 'square', 0.12, 0.2), 50); setTimeout(() => playBlip(1100, 'square', 0.10, 0.15), 120); },
  reza:  () => { playBlip(550, 'triangle', 0.1, 0.2); setTimeout(() => playBlip(440, 'triangle', 0.15, 0.2), 60); },
  disa:  () => { playBlip(700, 'triangle', 0.14, 0.18); }
};

function playSfxEscape() { playBlip(220, 'sawtooth', 0.18, 0.12); }
function playSfxComboUp(level) { playBlip(440 + level * 80, 'square', 0.08, 0.15); }
function playSfxCountdown() { playBlip(660, 'square', 0.15, 0.2); }
function playSfxGo() {
  [440, 550, 660, 880].forEach((f, i) => setTimeout(() => playBlip(f, 'square', 0.1, 0.2), i * 60));
}
function playSfxGameOver() {
  [440, 330, 220, 165].forEach((f, i) => setTimeout(() => playBlip(f, 'sawtooth', 0.2, 0.15), i * 120));
}

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let phase = 'idle';       // idle | countdown | playing | over
let score = 0;
let highScore = parseInt(localStorage.getItem('farewell_hiscore') || '0');
let timeLeft = 60;
let lives = 3;
let combo = 0;
let difficulty = 'normal';
let totalClicks = 0;
let totalHits = 0;

// hitCount tracks per-character whacks for MVP chart
let hitCount = {};
CHARACTERS.forEach(c => hitCount[c.id] = 0);

// holes[i] = { id, charId, holeState, timers:[] }
// holeState: 'empty' | 'rising' | 'up' | 'falling'
let holes = Array(10).fill(null).map((_, i) => ({ id:i, charId:null, holeState:'empty', timers:[] }));

let gameTimer = null;
let spawnTimer = null;
let comboDecayTimer = null;

// ─────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────
const elGrid        = document.getElementById('game-grid');
const elScore       = document.getElementById('hud-score');
const elTime        = document.getElementById('hud-time');
const elLives       = document.getElementById('hud-lives');
const elComboFill   = document.getElementById('combo-bar-fill');
const elComboText   = document.getElementById('combo-bar-text');
const elIdle        = document.getElementById('idle-overlay');
const elOver        = document.getElementById('over-overlay');
const elCountdown   = document.getElementById('countdown-overlay');
const elCountText   = document.getElementById('countdown-text');
const elIdleHiscore = document.getElementById('idle-hiscore');
const btnStart      = document.getElementById('btn-start');
const btnRestart    = document.getElementById('btn-restart');
const btnPhotobooth = document.getElementById('btn-photobooth');
const btnSound      = document.getElementById('btn-sound');
const diffBtns      = document.querySelectorAll('.diff-btn');

// ─────────────────────────────────────────
//  BOARD INIT
// ─────────────────────────────────────────
function initBoard() {
  elGrid.innerHTML = '';
  holes.forEach(hole => {
    const slot = document.createElement('div');
    slot.className = 'hole-slot flex flex-col items-center';
    slot.innerHTML = `
      <div class="sprite-clip relative w-20 h-24 flex items-end justify-center">
        <img id="spr-${hole.id}"
          src="" alt=""
          draggable="false"
          class="avatar-sprite absolute bottom-0 w-16 h-20 object-contain hidden select-none pointer-events-auto"
          style="image-rendering:pixelated;"
        />
        <!-- BONK label + points, animated separately -->
        <div id="bonk-${hole.id}" class="absolute bottom-20 left-1/2 -translate-x-1/2 pointer-events-none text-center hidden z-20">
          <div class="font-hero-title-mobile text-[14px] text-neon-yellow drop-shadow-[2px_2px_0_#000] leading-tight">BONK!</div>
          <div id="pts-${hole.id}" class="font-button-label text-[11px] text-white drop-shadow-[1px_1px_0_#000]">+100</div>
        </div>
      </div>
      <!-- Oval hole -->
      <div class="hole w-20 h-7 rounded-[50%] -mt-3 relative z-10"></div>
      <!-- Character name -->
      <div id="name-${hole.id}" class="font-caption text-[14px] text-text-secondary mt-1 h-5 text-center"></div>
    `;
    elGrid.appendChild(slot);

    // Whack event — pointer for mouse+touch
    const spr = slot.querySelector(`#spr-${hole.id}`);
    spr.addEventListener('pointerdown', e => {
      e.preventDefault();
      totalClicks++;
      handleWhack(hole.id);
    });
  });
}

// ─────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────
function renderHUD() {
  elScore.textContent = score.toString().padStart(6, '0');
  elTime.textContent  = timeLeft;
  elIdleHiscore.textContent = highScore.toString().padStart(6, '0');

  // Lives hearts
  const heartHTML = count => Array(count).fill(
    `<span class="material-symbols-outlined text-error" style="font-variation-settings:'FILL' 1;">favorite</span>`
  ).join('');
  const emptyHTML = count => Array(count).fill(
    `<span class="material-symbols-outlined text-surface-variant">favorite_border</span>`
  ).join('');
  elLives.innerHTML = heartHTML(Math.max(lives, 0)) + emptyHTML(Math.max(3 - lives, 0));

  // Combo bar (max combo = 5)
  const pct = (combo / 5) * 100;
  elComboFill.style.width = pct + '%';
  elComboText.textContent = `COMBO x${combo}`;
  if (combo > 0) elComboFill.classList.add('combo-glow');
  else           elComboFill.classList.remove('combo-glow');

  // Time urgency: pulse when ≤ 10s
  if (timeLeft <= 10 && phase === 'playing') elTime.classList.add('animate-pulse', 'text-error');
  else                                       elTime.classList.remove('animate-pulse', 'text-error');
}

// ─────────────────────────────────────────
//  DIFFICULTY UI
// ─────────────────────────────────────────
function renderDiffUI() {
  diffBtns.forEach(btn => {
    const d = btn.dataset.diff;
    if (d === difficulty) {
      btn.className = 'diff-btn pixel-btn bg-surface-bright text-neon-yellow font-button-label text-button-label px-6 py-3 border-2 border-neon-yellow drop-shadow-[0_0_5px_rgba(255,225,53,0.5)] uppercase';
    } else {
      btn.className = 'diff-btn pixel-btn bg-surface-variant text-on-surface font-button-label text-button-label px-6 py-3 border-2 border-border-pixel hover:border-neon-cyan uppercase opacity-70';
    }
  });
}

// ─────────────────────────────────────────
//  HOLE STATE MACHINE
//  Each hole has its own timer array to prevent
//  stale-closure bugs from overlapping timeouts
// ─────────────────────────────────────────
function clearHoleTimers(holeId) {
  const hole = holes[holeId];
  hole.timers.forEach(clearTimeout);
  hole.timers = [];
}

function setHoleState(holeId, newState, charId) {
  const hole = holes[holeId];
  clearHoleTimers(holeId);

  hole.holeState = newState;
  if (charId !== undefined) hole.charId = charId;

  const spr   = document.getElementById(`spr-${holeId}`);
  const nameEl = document.getElementById(`name-${holeId}`);
  const char  = CHARACTERS.find(c => c.id === hole.charId);

  // Strip all animation classes
  spr.classList.remove('avatar-rising','avatar-up','avatar-falling','hit-flash-anim','hidden');

  switch (newState) {

    case 'empty':
      spr.classList.add('hidden');
      spr.src = '';
      nameEl.textContent = '';
      hole.charId = null;
      break;

    case 'rising': {
      spr.src = char.sprite;
      nameEl.textContent = char.name;
      nameEl.style.color = '';
      // force reflow so animation restarts cleanly
      void spr.offsetWidth;
      spr.classList.add('avatar-rising');

      const t = setTimeout(() => {
        if (holes[holeId].holeState === 'rising') setHoleState(holeId, 'up');
      }, 220);
      hole.timers.push(t);
      break;
    }

    case 'up': {
      void spr.offsetWidth;
      spr.classList.add('avatar-up');
      const cfg = DIFFICULTY_CONFIG[difficulty];
      const upMs = cfg.upDuration * char.speed;

      const t = setTimeout(() => {
        // Only escape if still 'up' (not already whacked)
        if (holes[holeId].holeState === 'up') {
          setHoleState(holeId, 'falling');
          onEscape(holeId);
        }
      }, upMs);
      hole.timers.push(t);
      break;
    }

    case 'falling':
      void spr.offsetWidth;
      spr.classList.add('avatar-falling');
      nameEl.style.color = '#FF3B3B';

      const t = setTimeout(() => setHoleState(holeId, 'empty'), 280);
      hole.timers.push(t);
      break;
  }
}

// ─────────────────────────────────────────
//  SPAWN
// ─────────────────────────────────────────
function spawnCharacter() {
  if (phase !== 'playing') return;
  const cfg = DIFFICULTY_CONFIG[difficulty];

  const emptyHoles  = holes.filter(h => h.holeState === 'empty');
  const activeCount = holes.filter(h => h.holeState === 'rising' || h.holeState === 'up').length;

  if (emptyHoles.length === 0 || activeCount >= cfg.maxSimultaneous) return;

  const target = emptyHoles[Math.floor(Math.random() * emptyHoles.length)];
  const char   = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];

  setHoleState(target.id, 'rising', char.id);
}

// ─────────────────────────────────────────
//  WHACK
// ─────────────────────────────────────────
function handleWhack(holeId) {
  const hole = holes[holeId];
  if (!hole || hole.holeState !== 'up') return;

  const char = CHARACTERS.find(c => c.id === hole.charId);
  totalHits++;

  // Score
  const multiplier = Math.min(combo + 1, 5);
  const earned = char.points * multiplier;
  score += earned;
  hitCount[char.id]++;

  // Combo
  const prevCombo = combo;
  combo = Math.min(combo + 1, 5);
  resetComboDecay();
  if (combo > prevCombo) playSfxComboUp(combo);

  // Character SFX
  if (CHAR_SFX[char.id]) CHAR_SFX[char.id]();

  // BONK! visual
  showBonk(holeId, earned);

  // Immediately hide sprite (whacked)
  clearHoleTimers(holeId);
  hole.holeState = 'whacked'; // prevent escape from firing
  const spr = document.getElementById(`spr-${holeId}`);
  spr.classList.remove('avatar-up');
  spr.classList.add('hit-flash-anim');

  const t = setTimeout(() => setHoleState(holeId, 'empty'), 220);
  hole.timers.push(t);

  renderHUD();
}

function showBonk(holeId, earned) {
  const bonkEl = document.getElementById(`bonk-${holeId}`);
  const ptsEl  = document.getElementById(`pts-${holeId}`);
  ptsEl.textContent = `+${earned}`;
  bonkEl.classList.remove('hidden', 'bonk-pop-anim');
  void bonkEl.offsetWidth; // reflow
  bonkEl.classList.add('bonk-pop-anim');
  setTimeout(() => bonkEl.classList.add('hidden'), 560);
}

// ─────────────────────────────────────────
//  ESCAPE (character not whacked in time)
// ─────────────────────────────────────────
function onEscape(holeId) {
  if (phase !== 'playing') return;
  playSfxEscape();

  lives = Math.max(lives - 1, 0);
  renderHUD();

  // Shake the lives display
  elLives.classList.remove('life-shake');
  void elLives.offsetWidth;
  elLives.classList.add('life-shake');

  if (lives <= 0) endGame();
}

// ─────────────────────────────────────────
//  COMBO DECAY
// ─────────────────────────────────────────
function resetComboDecay() {
  clearTimeout(comboDecayTimer);
  comboDecayTimer = setTimeout(() => {
    combo = 0;
    renderHUD();
  }, DIFFICULTY_CONFIG[difficulty].comboDecay);
}

// ─────────────────────────────────────────
//  GAME FLOW
// ─────────────────────────────────────────
function startSequence() {
  // Reset state
  score = 0; timeLeft = 60; lives = 3; combo = 0;
  totalClicks = 0; totalHits = 0;
  CHARACTERS.forEach(c => hitCount[c.id] = 0);
  holes.forEach(h => { clearHoleTimers(h.id); h.holeState = 'empty'; h.charId = null; });
  // Re-init sprites to clean state
  holes.forEach(h => {
    const spr = document.getElementById(`spr-${h.id}`);
    const nameEl = document.getElementById(`name-${h.id}`);
    if (spr)    { spr.classList.add('hidden'); spr.classList.remove('avatar-rising','avatar-up','avatar-falling','hit-flash-anim'); spr.src = ''; }
    if (nameEl) nameEl.textContent = '';
  });

  elIdle.classList.add('hidden');
  elOver.classList.add('hidden');
  renderHUD();

  // Countdown
  phase = 'countdown';
  elCountdown.classList.remove('hidden');
  let count = 3;
  elCountText.textContent = count;
  playSfxCountdown();

  const countInt = setInterval(() => {
    count--;
    if (count > 0) {
      elCountText.textContent = count;
      playSfxCountdown();
    } else if (count === 0) {
      elCountText.textContent = 'GO!';
      playSfxGo();
    } else {
      clearInterval(countInt);
      elCountdown.classList.add('hidden');
      phase = 'playing';
      startGameLoop();
    }
  }, 1000);
}

function startGameLoop() {
  const cfg = DIFFICULTY_CONFIG[difficulty];

  gameTimer = setInterval(() => {
    timeLeft--;
    renderHUD();
    if (timeLeft <= 0) endGame();
  }, 1000);

  spawnTimer = setInterval(spawnCharacter, cfg.spawnInterval);
}

function endGame() {
  if (phase === 'over') return;
  phase = 'over';
  clearInterval(gameTimer);
  clearInterval(spawnTimer);
  clearTimeout(comboDecayTimer);
  playSfxGameOver();

  // Clear all active holes
  holes.forEach(h => { clearHoleTimers(h.id); setHoleState(h.id, 'empty'); });

  // Save high score
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('farewell_hiscore', highScore.toString());
  }

  renderHUD();
  renderResultScreen();
  elOver.classList.remove('hidden');
}

// ─────────────────────────────────────────
//  RESULT SCREEN
// ─────────────────────────────────────────
function renderResultScreen() {
  document.getElementById('final-score').textContent       = score.toString().padStart(6, '0');
  document.getElementById('high-score-display').textContent = highScore.toString().padStart(6, '0');

  const acc = totalClicks > 0 ? Math.round((totalHits / totalClicks) * 100) : 0;
  document.getElementById('accuracy-display').textContent  = acc + '%';

  const chart = document.getElementById('mvp-chart');
  chart.innerHTML = '';

  const maxHits = Math.max(...Object.values(hitCount), 1);
  const sorted  = [...CHARACTERS].sort((a, b) => hitCount[b.id] - hitCount[a.id]);

  sorted.forEach((char, idx) => {
    const hits  = hitCount[char.id];
    const pct   = Math.round((hits / maxHits) * 100);
    const isMVP = idx === 0 && hits > 0;

    const row = document.createElement('div');
    row.className = 'flex items-center gap-2';
    row.innerHTML = `
      <span class="w-16 text-right text-white truncate text-[14px] shrink-0">${char.name.split(' ').pop()}</span>
      <div class="flex-grow bg-surface-container h-4 border border-border-pixel relative overflow-hidden">
        <div class="${char.barColor} h-full transition-all duration-500" style="width:${pct}%"></div>
      </div>
      <span class="w-10 text-neon-yellow text-right text-[14px] shrink-0">${hits}${isMVP && hits > 0 ? ' 🏆' : ''}</span>
    `;
    chart.appendChild(row);
  });
}

// ─────────────────────────────────────────
//  EVENT LISTENERS
// ─────────────────────────────────────────
btnStart.addEventListener('click', startSequence);

btnRestart.addEventListener('click', () => {
  elOver.classList.add('hidden');
  elIdle.classList.remove('hidden');
  phase = 'idle';
  renderHUD();
});

btnPhotobooth.addEventListener('click', () => {
  // Navigate to photobooth page — adjust href as needed
  alert('Navigating to Photobooth...\n(Sambungkan ke halaman D Farewell Quest)');
});

diffBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    difficulty = btn.dataset.diff;
    renderDiffUI();
  });
});

btnSound.addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  btnSound.classList.toggle('muted', !soundEnabled);
  // Toggle background music if audio.js is present
  if (typeof toggleMute === 'function') toggleMute();
  
  // Resume AudioContext if needed (browser policy)
  if (soundEnabled && sfxAudioCtx && sfxAudioCtx.state === 'suspended') sfxAudioCtx.resume();
  playBlip(soundEnabled ? 880 : 220, 'square', 0.08, 0.15);
});

// Resume AudioContext on first interaction (Chrome policy)
document.addEventListener('pointerdown', () => {
  if (sfxAudioCtx && sfxAudioCtx.state === 'suspended') sfxAudioCtx.resume();
}, { once: true });

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
initBoard();
renderDiffUI();
renderHUD();
</script>
</body></html>
