<script>
        function selectCharacter(element) {
            // Remove active class from all cards
            document.querySelectorAll('.pixel-border-active').forEach(card => {
                card.classList.remove('pixel-border-active', 'scale-105');
                card.classList.add('pixel-border');
                
                // Reset text colors
                const name = card.querySelector('h3');
                if(name) {
                    name.classList.remove('text-neon-cyan');
                    name.classList.add('text-on-surface');
                }
                const role = card.querySelector('p');
                if(role) {
                    role.classList.remove('text-secondary');
                    role.classList.add('text-text-secondary');
                }
            });

            // Add active class to clicked card
            element.classList.remove('pixel-border');
            element.classList.add('pixel-border-active', 'scale-105');
            
            const newName = element.querySelector('h3');
            if(newName) {
                newName.classList.remove('text-on-surface');
                newName.classList.add('text-neon-cyan');
            }
            const newRole = element.querySelector('p');
            if(newRole) {
                newRole.classList.remove('text-text-secondary');
                newRole.classList.add('text-secondary');
            }
        }
    </script>
