<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Farewell Quest - Title Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=VT323&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="Style/tailwind.config.js"></script>
<link href="Style/style.css" rel="stylesheet"/>
<script src="assets/audio.js"></script>
</head>
<body class="bg-surface-container-lowest text-text-primary min-h-screen flex flex-col font-dialog-text relative overflow-hidden crt-flicker">
<!-- CRT Overlay -->
<div class="fixed inset-0 crt-scanlines z-50 pointer-events-none"></div>
<!-- Starfield Background -->
<div class="absolute inset-0 star-field opacity-30"></div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop relative z-10 w-full h-screen">
<!-- Volume Button -->
<div class="absolute top-8 right-8 z-50">
<button onclick="toggleMute(event)" class="text-primary dark:text-primary hover:text-neon-cyan hover:scale-105 transition-transform">
<span id="volume-icon" class="material-symbols-outlined text-text-secondary">volume_up</span>
</button>
</div>
<!-- Hero Section -->
<section class="flex flex-col items-center text-center space-y-12 w-full max-w-4xl mx-auto">
<!-- Avatar / Sprite Placeholder -->
<div class="w-32 h-32 md:w-48 md:h-48 mb-4 relative hover:scale-105 transition-transform duration-300">
<img class="w-full h-full object-cover pixel-corners border-4 border-border-pixel pixel-shadow bg-bg-elevated" data-alt="A retro 16-bit pixel art style illustration of a mysterious RPG hero standing on a hilltop looking towards a glowing, neon horizon. The sky is dark deep space indigo with twinkling stars. The character is rendered in crisp, blocky pixels with no anti-aliasing. The scene evokes a strong sense of 90s arcade nostalgia with vibrant cyber green and magic violet accents." src="assets/images/img_bbfbddb2.png"/>
</div>
<!-- Title Container -->
<div class="space-y-4 w-full">
<h1 class="font-hero-title-mobile text-hero-title-mobile md:font-hero-title md:text-hero-title text-neon-cyan text-glow-neon uppercase tracking-widest break-words leading-tight">
                    FAREWELL QUEST
                </h1>
<h2 class="font-section-title text-section-title text-secondary uppercase tracking-widest">
                    A MEMORY ADVENTURE
                </h2>
</div>
<!-- Action Area -->
<div class="mt-16 w-full flex justify-center">
<button onclick="window.location.href='chara_selection.html'" class="bg-bg-elevated border-4 border-primary-container text-primary-container font-button-label text-button-label px-8 py-4 pixel-corners pixel-shadow pixel-button-hover transition-all duration-75 uppercase tracking-wider blink-animation text-glow-yellow">
                    PRESS START TO BEGIN
                </button>
</div>
</section>
<!-- Footer Decoration (Optional, adding to retro feel) -->
<div class="absolute bottom-margin-mobile md:bottom-margin-desktop w-full text-center text-text-secondary font-caption text-caption uppercase tracking-widest">
<p>© 199X RETRO QUEST SYSTEMS - INSERT COIN</p>
</div>
</main>
</body></html>
