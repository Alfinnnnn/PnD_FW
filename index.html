<style>
        /* Retro Utilities */
        .pixel-corners {
            clip-path: polygon(
                0 4px, 4px 4px, 4px 0, 
                calc(100% - 4px) 0, calc(100% - 4px) 4px, 100% 4px, 
                100% calc(100% - 4px), calc(100% - 4px) calc(100% - 4px), calc(100% - 4px) 100%, 
                4px 100%, 4px calc(100% - 4px), 0 calc(100% - 4px)
            );
        }
        
        .crt-scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
        }

        .crt-flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        .text-glow-neon {
            text-shadow: 0 0 8px rgba(0, 245, 255, 0.8), 0 0 16px rgba(0, 245, 255, 0.4);
        }

        .text-glow-yellow {
            text-shadow: 0 0 8px rgba(255, 225, 53, 0.8), 0 0 16px rgba(255, 225, 53, 0.4);
        }

        .blink-animation {
            animation: blinker 1.5s step-start infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        .pixel-shadow {
            box-shadow: 
                4px 0 0 0 theme('colors.border-pixel'),
                0 4px 0 0 theme('colors.border-pixel'),
                -4px 0 0 0 theme('colors.border-pixel'),
                0 -4px 0 0 theme('colors.border-pixel'),
                4px 4px 0 0 theme('colors.surface-container-lowest'),
                8px 8px 0 0 theme('colors.surface-container-lowest');
        }

        .pixel-button-hover:hover {
            transform: translate(2px, 2px);
            box-shadow: 
                4px 0 0 0 theme('colors.border-pixel'),
                0 4px 0 0 theme('colors.border-pixel'),
                -4px 0 0 0 theme('colors.border-pixel'),
                0 -4px 0 0 theme('colors.border-pixel'),
                2px 2px 0 0 theme('colors.surface-container-lowest'),
                4px 4px 0 0 theme('colors.surface-container-lowest');
        }
        
        .star-field {
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: stars 20s linear infinite;
        }

        @keyframes stars {
            0% { background-position: 0 0; }
            100% { background-position: 200px 200px; }
        }
    </style>
